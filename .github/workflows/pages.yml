name: Build and Deploy Jekyll (Fresh)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
      
      - name: Clear all caches
        run: |
          rm -rf _site .jekyll-cache .bundle vendor Gemfile.lock
          rm -f README_submission.md || true
          echo "Cleared all caches and problematic files"
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false
      
      - name: Fresh bundle install
        run: |
          bundle install --path vendor/bundle
          echo "Bundle installed fresh"
      
      - name: Build Jekyll (minimal)
        run: |
          bundle exec jekyll build --verbose
        env:
          JEKYLL_ENV: production
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true