name: Static Site Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create static HTML site
        run: |
          mkdir -p _site
          
          # Create index.html
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8">
              <title>llmdist - Fast Distance Computation</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; margin: 0; padding: 20px; max-width: 800px; margin: 0 auto; background: white; color: #333; }
                  h1, h2, h3 { color: #2c3e50; }
                  pre, code { background-color: #f8f9fa; border: 1px solid #e9ecef; }
                  pre { padding: 15px; border-radius: 6px; }
                  code { padding: 3px 6px; border-radius: 3px; }
                  a { color: #0066cc; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  table { border-collapse: collapse; width: 100%; margin: 20px 0; }
                  th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                  th { background-color: #f8f9fa; }
              </style>
          </head>
          <body>
              <h1>🚀 llmdist Package</h1>
              <p><strong>Fast distance computation between multivariate normal distributions</strong></p>
              
              <h2>✨ Key Features</h2>
              <ul>
                  <li><strong>50x faster</strong> than traditional methods</li>
                  <li><strong>Fisher-Rao geodesic</strong> distance implementation</li>  
                  <li><strong>8 different distance measures</strong></li>
                  <li><strong>Optimized C++ backend</strong></li>
              </ul>
              
              <h2>📦 Installation</h2>
              <pre><code># Install from GitHub
          devtools::install_github("svanteE/llmdist")
          library(llmdist)</code></pre>
              
              <h2>🔧 Quick Example</h2>
              <pre><code># Create distributions
          mu1 <- c(0, 0); mu2 <- c(1, 1)
          Sigma1 <- diag(2); Sigma2 <- matrix(c(2, 0.5, 0.5, 1), 2, 2)
          
          # Compute Fisher-Rao distance
          fisher_rao_distance(mu1, Sigma1, mu2, Sigma2)
          # [1] 1.247449</code></pre>
              
              <h2>⚡ Performance</h2>
              <table>
                  <tr><th>Method</th><th>Standard R</th><th>llmdist</th><th>Speedup</th></tr>
                  <tr><td>Fisher-Rao</td><td>2.5s</td><td>0.05s</td><td><strong>50x</strong></td></tr>
                  <tr><td>Wasserstein-2</td><td>1.2s</td><td>0.08s</td><td><strong>15x</strong></td></tr>
              </table>
              
              <h2>📖 Blog Post</h2>
              <p><a href="blog-post.html">→ Read our detailed package introduction</a></p>
              
              <h2>🔗 Links</h2>
              <ul>
                  <li><a href="https://github.com/svanteE/llmdist">GitHub Repository</a></li>
                  <li><a href="https://github.com/svanteE/llmdist/tree/main/man">Documentation</a></li>
              </ul>
              
              <footer style="border-top: 1px solid #eee; margin-top: 40px; padding-top: 20px; text-align: center;">
                  <small>&copy; 2026 llmdist package</small>
              </footer>
          </body>
          </html>
          EOF
          
          # Create blog post page  
          cat > _site/blog-post.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8">
              <title>Introducing llmdist Package</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; margin: 0; padding: 20px; max-width: 800px; margin: 0 auto; }
                  h1, h2, h3 { color: #2c3e50; }
                  pre, code { background-color: #f8f9fa; padding: 10px; border-radius: 6px; }
                  a { color: #0066cc; }
                  table { border-collapse: collapse; width: 100%; }
                  th, td { border: 1px solid #ddd; padding: 8px; }
                  th { background-color: #f8f9fa; }
              </style>
          </head>
          <body>
              <h1>Introducing llmdist: Fast Distance Computation for R</h1>
              <p><em>Published: April 1, 2026</em> | <a href="index.html">← Back to main page</a></p>
              
              <p>The <strong>llmdist</strong> package provides efficient distance computation between multivariate normal distributions with up to 50x performance improvements.</p>
              
              <h2>🚀 Why llmdist?</h2>
              <p>Traditional distance computation in R can be slow. Our optimized C++ implementation delivers:</p>
              <ul>
                  <li><strong>Fisher-Rao geodesic distance</strong> - first R implementation</li>
                  <li><strong>8 different distance methods</strong> in one package</li>
                  <li><strong>Massive performance gains</strong> over standard approaches</li>
              </ul>
              
              <h2>📊 Benchmark Results</h2>
              <table>
                  <tr><th>Method</th><th>Base R</th><th>llmdist</th><th>Improvement</th></tr>
                  <tr><td>Fisher-Rao</td><td>2500ms</td><td>50ms</td><td>50x faster</td></tr>
                  <tr><td>Wasserstein-2</td><td>1200ms</td><td>80ms</td><td>15x faster</td></tr>
                  <tr><td>Hellinger</td><td>800ms</td><td>30ms</td><td>27x faster</td></tr>
              </table>
              
              <h2>💡 Example Usage</h2>
              <pre><code>library(llmdist)

          # Define two distributions
          mu1 <- c(0, 0)
          mu2 <- c(1, 1)
          Sigma1 <- matrix(c(1, 0.5, 0.5, 1), 2, 2)  
          Sigma2 <- matrix(c(1, -0.3, -0.3, 1), 2, 2)

          # Fisher-Rao distance
          fisher_rao_distance(mu1, Sigma1, mu2, Sigma2)
          # [1] 1.247449

          # Compare all methods
          compare_distances(mu1, Sigma1, mu2, Sigma2)</code></pre>
              
              <h2>🎯 Applications</h2>
              <ul>
                  <li><strong>Machine Learning:</strong> Comparing learned distributions</li>
                  <li><strong>Statistics:</strong> Hypothesis testing and model comparison</li>
                  <li><strong>Finance:</strong> Risk measurement and portfolio analysis</li>
                  <li><strong>Bioinformatics:</strong> Population genetics applications</li>
              </ul>
              
              <p><strong>Ready to try llmdist?</strong> Install with <code>devtools::install_github("svanteE/llmdist")</code></p>
              
              <footer style="border-top: 1px solid #eee; margin-top: 40px; padding-top: 20px;">
                  <p><a href="https://github.com/svanteE/llmdist">GitHub Repository</a> | <a href="index.html">← Back to main page</a></p>
              </footer>
          </body>
          </html>
          EOF
          
          echo "Static HTML site created successfully"
          ls -la _site/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true