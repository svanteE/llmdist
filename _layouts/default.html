<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; line-height: 1.6; margin: 0; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1, h2, h3, h4, h5, h6 { margin-top: 1.5em; }
        pre, code { background-color: #f4f4f4; }
        pre { padding: 10px; overflow-x: auto; }
        code { padding: 2px 4px; }
        .highlight { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ "/" | relative_url }}">{{ site.title | escape }}</a></h1>
        <p>{{ site.description | escape }}</p>
    </header>
    
    <main>
        {{ content }}
    </main>
    
    <footer>
        <p><small>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</small></p>
    </footer>
</body>
</html>
