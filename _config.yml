# Basic Jekyll configuration without theme
title: llmdist
description: Fast distance computation between multivariate normal distributions

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins (minimal)
plugins:
  - jekyll-feed

# Exclude everything except essential files
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - node_modules/
  - DESCRIPTION
  - NAMESPACE
  - LICENSE
  - "*.R"
  - "*.bat" 
  - "*.ps1"
  - tests/
  - man/
  - inst/
  - examples/
  - README_submission.md
  - "*.Rd"