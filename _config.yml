# Site settings
title: "llmdist Blog"
description: "Distance computation between multivariate normal distributions"
url: "https://svanteE.github.io"
baseurl: "/llmdist"

# Author
author:
  name: "Svante Eriksen"
  email: "svante@example.com"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Plugins (GitHub Pages compatible only)
plugins:
  - jekyll-feed

# Exclude files (GitHub Pages compatible)
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - "*.R"
  - DESCRIPTION
  - NAMESPACE
  - man/
  - tests/
  - examples/
  - .github/