# Minimal GitHub Pages configuration
title: llmdist
description: Fast distance computation between multivariate normal distributions

# GitHub repository
repository: svantee/llmdist
github:
  repository_name: llmdist
  repository_nwo: svantee/llmdist

# GitHub Pages settings
baseurl: ""
url: "https://svantee.github.io"

# Build settings (GitHub Pages defaults)
markdown: kramdown
highlighter: rouge
theme: minima

# GitHub Pages approved plugins only
plugins:
  - jekyll-feed

# Exclude R package files and problematic files
exclude:
  - README_submission.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - node_modules/
  - DESCRIPTION
  - NAMESPACE
  - LICENSE
  - "*.R"
  - "*.bat"
  - "*.ps1"
  - tests/
  - man/
  - inst/
  - examples/