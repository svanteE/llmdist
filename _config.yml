# Ultra minimal Jekyll configuration
title: llmdist
description: Fast distance computation between multivariate normal distributions

# Build settings
markdown: kramdown

# No plugins to avoid dependencies
plugins: []

# Exclude everything except core content
exclude:
  - Gemfile*
  - vendor/
  - .bundle/
  - node_modules/
  - DESCRIPTION
  - NAMESPACE
  - LICENSE
  - "*.R"
  - "*.bat" 
  - "*.ps1"
  - tests/
  - man/
  - inst/
  - examples/
  - README_submission.md
  - "*.Rd"
  - "*.pdf"
  - "*.log"
  - "*.out"
  - "*.html"
  - .git/
  - .github/
  - .vscode/